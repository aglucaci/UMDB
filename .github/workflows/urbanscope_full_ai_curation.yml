name: UMDB Full AI Curation

on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model used for metadata curation"
        required: false
        default: "gpt-4o-mini"
        type: string
      max_records:
        description: "Maximum records to curate, leave 0 to process the full dataset"
        required: false
        default: "0"
        type: string
      overwrite:
        description: "Re-run curation even when a cached AI review already exists"
        required: false
        default: false
        type: boolean
      year:
        description: "Optional year filter, leave blank to curate all years"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: urbanscope-full-ai-curation
  cancel-in-progress: false

jobs:
  curate-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run full-dataset AI curation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_TOOL: urbanscope-srr-harvester
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail

          MODEL="${{ github.event.inputs.model }}"
          MAX_RECORDS="${{ github.event.inputs.max_records }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"
          YEAR="${{ github.event.inputs.year }}"

          CMD=(
            python3 -m scripts.urbanscope_harvester.cli curate-ai
            --model "$MODEL"
            --max-records "$MAX_RECORDS"
          )

          if [ "$OVERWRITE" = "true" ]; then
            CMD+=(--overwrite)
          fi

          if [ -n "$YEAR" ]; then
            CMD+=(--year "$YEAR")
          fi

          printf 'Running command:\n'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

      - name: Summarize curation results
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path("docs/debug/latest_report.json")
          if not report_path.exists():
              print("No debug report found at docs/debug/latest_report.json")
              raise SystemExit(0)

          data = json.loads(report_path.read_text(encoding="utf-8"))
          reports = data.get("reports", [])
          report = reports[-1] if reports else {}
          ai = report.get("ai_curation", {}) if isinstance(report.get("ai_curation", {}), dict) else {}
          records_considered = report.get("records_considered", 0)

          lines = [
              "## UMDB AI Curation Summary",
              "",
              f"- Records considered: {records_considered}",
              f"- AI reviewed: {ai.get('reviewed', 0)}",
              f"- Skipped from cache: {ai.get('skipped_cached', 0)}",
              f"- Errors: {ai.get('errors', 0)}",
          ]

          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_file.open("a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")

          print("\n".join(lines))
          PY

      - name: Rebuild published AI-enriched exports
        run: |
          python3 - <<'PY'
          from scripts.urbanscope_harvester.exports import rebuild_srr_exports_chunked

          rebuild_srr_exports_chunked()
          print("Rebuilt docs/db exports from current catalogs and AI cache.")
          PY

      - name: Summarize published AI field coverage
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest_path = Path("docs/db/srr_records_manifest.json")
          if not manifest_path.exists():
              print("Published manifest not found at docs/db/srr_records_manifest.json")
              raise SystemExit(0)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          parts = manifest.get("parts", []) if isinstance(manifest, dict) else []

          total_rows = 0
          with_ai = 0
          reviewed = 0
          fixed = 0
          insufficient = 0
          urban = 0

          for part in parts:
              part_path = Path(part.get("path", ""))
              if not part_path.exists():
                  continue
              rows = json.loads(part_path.read_text(encoding="utf-8"))
              if not isinstance(rows, list):
                  continue
              for row in rows:
                  total_rows += 1
                  ai = row.get("ai_curation", {}) if isinstance(row.get("ai_curation", {}), dict) else {}
                  if ai:
                      with_ai += 1
                  if ai.get("reviewed"):
                      reviewed += 1
                  if ai.get("ai_fixed"):
                      fixed += 1
                  if str(ai.get("metadata_sufficiency", "")).lower() == "insufficient":
                      insufficient += 1
                  if str(ai.get("urban_origin", "")).lower() == "urban":
                      urban += 1

          lines = [
              "## Published AI Field Coverage",
              "",
              f"- Published rows scanned: {total_rows}",
              f"- Rows with ai_curation: {with_ai}",
              f"- Reviewed: {reviewed}",
              f"- AI-fixed: {fixed}",
              f"- Insufficient metadata: {insufficient}",
              f"- Urban-origin: {urban}",
          ]

          summary_file = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_file.open("a", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")

          print("\n".join(lines))
          PY

      - name: Summarize file changes
        run: |
          set -euo pipefail
          CHANGED="$(git status --short data docs .gitignore || true)"
          {
            echo ""
            echo "## Repository Changes"
            echo ""
            if [ -n "$CHANGED" ]; then
              echo "Tracked file changes detected after curation."
              echo ""
              echo '```text'
              printf '%s\n' "$CHANGED"
              echo '```'
            else
              echo "No tracked file changes were produced by this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit curated metadata release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git restore scripts/urbanscope_harvester/__pycache__ || true
          git add .gitignore data docs || true

          git commit -m "UMDB AI curation $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push
