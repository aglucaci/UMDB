name: UMDB Full AI Curation

on:
  workflow_dispatch:
    inputs:
      model:
        description: "OpenAI model used for metadata curation"
        required: false
        default: "gpt-4o-mini"
        type: string
      max_records:
        description: "Maximum records to curate, leave 0 to process the full dataset"
        required: false
        default: "0"
        type: string
      overwrite:
        description: "Re-run curation even when a cached AI review already exists"
        required: false
        default: false
        type: boolean
      year:
        description: "Optional year filter, leave blank to curate all years"
        required: false
        default: ""
        type: string

permissions:
  contents: write

concurrency:
  group: urbanscope-full-ai-curation
  cancel-in-progress: false

jobs:
  curate-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 1440

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run full-dataset AI curation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_TOOL: urbanscope-srr-harvester
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          set -euo pipefail

          MODEL="${{ github.event.inputs.model }}"
          MAX_RECORDS="${{ github.event.inputs.max_records }}"
          OVERWRITE="${{ github.event.inputs.overwrite }}"
          YEAR="${{ github.event.inputs.year }}"

          CMD=(
            python3 -m scripts.urbanscope_harvester.cli curate-ai
            --model "$MODEL"
            --max-records "$MAX_RECORDS"
          )

          if [ "$OVERWRITE" = "true" ]; then
            CMD+=(--overwrite)
          fi

          if [ -n "$YEAR" ]; then
            CMD+=(--year "$YEAR")
          fi

          printf 'Running command:\n'
          printf ' %q' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

      - name: Commit curated metadata release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git restore scripts/urbanscope_harvester/__pycache__ || true
          git add .gitignore data docs || true

          git commit -m "UMDB AI curation $(date -u +'%Y-%m-%d')" || echo "No changes"
          git push
